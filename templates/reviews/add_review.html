{% extends 'base.html' %}
{% block title %}Write a Review - LuxeStay{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Write a <span class="text-gold">Review</span></h1>
        <div class="section-divider"></div>
    </div>
</div>
<section class="section">
    <div class="container container-sm">
        <div class="form-card">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Review Type</label>
                    <select name="review_type" class="form-control">
                        <option value="general">General</option>
                        <option value="room">Room</option>
                        <option value="restaurant">Restaurant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rating</label>
                    <select name="rating" class="form-control">
                        <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                        <option value="4">⭐⭐⭐⭐ - Very Good</option>
                        <option value="3">⭐⭐⭐ - Good</option>
                        <option value="2">⭐⭐ - Fair</option>
                        <option value="1">⭐ - Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Sum up your experience" required>
                </div>
                <div class="form-group">
                    <label>Your Review</label>
                    <textarea name="content" class="form-control" rows="5"
                        placeholder="Tell us about your experience..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="fas fa-paper-plane"></i> Submit Review
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
