version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn luxestay.wsgi:application --bind 0.0.0.0:8000"

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=luxestay
      - POSTGRES_USER=luxestay
      - POSTGRES_PASSWORD=luxestay123
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  static_volume:
  media_volume:
